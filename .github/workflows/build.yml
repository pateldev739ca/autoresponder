name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        run: |
          echo "y" | sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
          unzip -q gradle-8.4-bin.zip
          echo "$(pwd)/gradle-8.4/bin" >> $GITHUB_PATH
      - name: Build APK
        run: cd autoresponder_clean && gradle assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ExhaustAuto-AutoReply
          path: autoresponder_clean/app/build/outputs/apk/debug/app-debug.apk
