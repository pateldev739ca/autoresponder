name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Grant execute permission
        run: chmod +x autoresponder_clean/gradlew
      - name: Build APK
        run: cd autoresponder_clean && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: autoresponder_clean/app/build/outputs/apk/debug/app-debug.apk
